<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NFL Question Review</title>
<style>
:root {
  --bg:       #07070f;
  --card:     #0f0f1c;
  --card2:    #141426;
  --border:   #1e1e35;
  --purple:   #A100FF;
  --purple-d: #7800cc;
  --text:     #e8e8f0;
  --muted:    #66668a;
  --muted2:   #3a3a5c;

  --ai:    #c44dff;
  --di:    #00d4ff;
  --ti:    #00e676;
  --ts:    #ffa726;

  --ok:     #00e676;
  --revise: #ffa726;
  --split:  #42a5f5;
  --drop:   #ef5350;

  --new:    #00e5ff;
  --merge:  #ce93d8;
  --modify: #fff176;
  --keep:   #66668a;
}

/* ── VERSION TOGGLE ────────────────────────────────────── */
.ver-toggle {
  display: flex;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  flex: 0 0 auto;
}
.ver-btn {
  background: none; border: none;
  color: var(--muted);
  padding: 5px 14px; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  letter-spacing: 0.05em;
}
.ver-btn.active { background: var(--purple); color: #fff; }

/* ── CHANGE BADGES ─────────────────────────────────────── */
.change-badge {
  padding: 2px 8px; border-radius: 5px;
  font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.07em;
  flex: 0 0 auto;
}
.change-new    { background: rgba(0,229,255,.15);  color: var(--new);    }
.change-modify { background: rgba(255,241,118,.12); color: var(--modify); }
.change-merge  { background: rgba(206,147,216,.15); color: var(--merge);  }
.change-split  { background: rgba(66,165,245,.15);  color: var(--split);  }
.change-keep   { background: rgba(102,102,138,.1);  color: var(--keep);   }

.v0ref-tag {
  font-size: 10px; color: var(--muted);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 5px;
}
.v0ref-tag span { color: var(--text); font-weight: 600; }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
}

/* ── STICKY HEADER ─────────────────────────────────────── */
#header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,7,15,0.96);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex; align-items: center; gap: 14px;
}

#header-title {
  font-size: 15px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
  flex: 0 0 auto;
}
#header-title em { color: var(--purple); font-style: normal; }

.mode-toggle {
  display: flex;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  flex: 0 0 auto;
}
.mode-btn {
  background: none; border: none;
  color: var(--muted);
  padding: 5px 16px; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  letter-spacing: 0.03em;
}
.mode-btn.active { background: var(--purple); color: #fff; }

#progress-wrap {
  display: flex; align-items: center; gap: 8px; margin-left: auto;
}
#progress-text { font-size: 12px; color: var(--muted); white-space: nowrap; }
#progress-track {
  width: 100px; height: 5px;
  background: var(--card2); border-radius: 3px; overflow: hidden;
}
#progress-fill {
  height: 100%; background: var(--purple);
  border-radius: 3px; width: 0%; transition: width 0.4s;
}

/* ── FILTER BAR ────────────────────────────────────────── */
#filter-bar {
  position: sticky; top: 49px; z-index: 90;
  background: rgba(7,7,15,0.96);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  padding: 8px 24px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.filter-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--muted2);
}
.filter-pill {
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); padding: 3px 10px;
  font-size: 11px; font-weight: 600;
  border-radius: 20px; cursor: pointer; transition: all 0.15s;
}
.filter-pill:hover { border-color: var(--muted); color: var(--text); }
.filter-pill.active { background: var(--purple); border-color: var(--purple); color: #fff; }
.filter-pill.ai.active  { background: var(--ai);     border-color: var(--ai);     color: #000; }
.filter-pill.di.active  { background: var(--di);     border-color: var(--di);     color: #000; }
.filter-pill.ti.active  { background: var(--ti);     border-color: var(--ti);     color: #000; }
.filter-pill.ts.active  { background: var(--ts);     border-color: var(--ts);     color: #000; }

.filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.fbar-spacer { flex: 1; }

.export-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); padding: 4px 12px;
  font-size: 11px; font-weight: 600; border-radius: 6px;
  cursor: pointer; transition: all 0.15s;
}
.export-btn:hover { border-color: var(--ti); color: var(--ti); }

/* ── CONTENT ───────────────────────────────────────────── */
#content { padding: 24px; max-width: 1100px; margin: 0 auto; }

/* ── FOCUS VIEW ────────────────────────────────────────── */
#focus-view { display: block; }
#list-view  { display: none; }

.focus-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 36px;
  max-width: 820px; margin: 0 auto;
}

.card-meta {
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
}
.layer-badge {
  padding: 3px 10px; border-radius: 6px;
  font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.badge-AI { background: rgba(196,77,255,.18); color: var(--ai); }
.badge-DI { background: rgba(0,212,255,.18);  color: var(--di); }
.badge-TI { background: rgba(0,230,118,.18);  color: var(--ti); }
.badge-TS { background: rgba(255,167,38,.18); color: var(--ts); }

.card-qid    { font-size: 14px; font-weight: 700; }
.card-domain { font-size: 12px; color: var(--muted); }

.issue-banner {
  background: rgba(255,167,38,.1);
  border: 1px solid rgba(255,167,38,.35);
  border-radius: 8px; padding: 9px 14px;
  font-size: 12px; color: var(--ts);
  margin-bottom: 18px;
}

.section-lbl {
  font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.09em; color: var(--muted2); margin-bottom: 7px;
}
.question-text {
  font-size: 1.25rem; font-weight: 500; line-height: 1.55;
  color: var(--text); margin-bottom: 24px;
}

.answer-block {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-bottom: 20px;
}
.format-tag {
  display: inline-block;
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 7px;
  font-size: 10px; color: var(--muted); margin-bottom: 10px;
}
.options-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.options-list li {
  font-size: 12.5px; color: var(--text);
  padding: 5px 10px;
  background: rgba(255,255,255,.03);
  border-left: 2px solid var(--border);
  border-radius: 4px;
}

.guide-block { margin-bottom: 16px; }
.guide-text {
  font-size: 13px; color: #9898c4; line-height: 1.6;
}
.answerguide-text {
  font-size: 12px; color: var(--muted); line-height: 1.6;
  font-family: 'SF Mono', Consolas, monospace;
}

.divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

.review-lbl {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--muted); margin-bottom: 9px;
}
.flag-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.flag-btn {
  background: var(--card2); border: 2px solid var(--border);
  border-radius: 8px; padding: 7px 14px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.15s; color: var(--muted);
  display: flex; align-items: center; gap: 5px;
}
.flag-btn:hover { opacity: 0.85; }
.flag-btn.ok     { color: var(--ok); }
.flag-btn.revise { color: var(--revise); }
.flag-btn.split  { color: var(--split); }
.flag-btn.drop   { color: var(--drop); }
.flag-btn.active.ok     { background: rgba(0,230,118,.15);  border-color: var(--ok);     }
.flag-btn.active.revise { background: rgba(255,167,38,.15); border-color: var(--revise); }
.flag-btn.active.split  { background: rgba(66,165,245,.15); border-color: var(--split);  }
.flag-btn.active.drop   { background: rgba(239,83,80,.15);  border-color: var(--drop);   }

.comment-box {
  width: 100%; min-height: 90px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  font-size: 13.5px; color: var(--text);
  font-family: inherit; line-height: 1.5; resize: vertical;
  transition: border-color 0.15s; margin-bottom: 16px;
}
.comment-box:focus { outline: none; border-color: var(--purple); }
.comment-box::placeholder { color: var(--muted2); }

.action-row {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.btn-save {
  background: var(--purple); border: none; color: #fff;
  padding: 9px 20px; font-size: 13px; font-weight: 700;
  border-radius: 8px; cursor: pointer; transition: background 0.15s;
}
.btn-save:hover { background: var(--purple-d); }
.btn-delete {
  background: none; border: 1px solid var(--border);
  color: var(--muted); padding: 9px 14px;
  font-size: 12px; font-weight: 600;
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
}
.btn-delete:hover { border-color: var(--drop); color: var(--drop); }
.btn-nav {
  background: var(--card2); border: 1px solid var(--border);
  color: var(--text); padding: 9px 14px;
  font-size: 12px; font-weight: 600;
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
}
.btn-nav:hover:not(:disabled) { border-color: var(--purple); }
.btn-nav:disabled { opacity: 0.3; cursor: default; }
.nav-counter { font-size: 12px; color: var(--muted); margin: 0 2px; }
.kbd-hint { font-size: 10px; color: var(--muted2); margin-left: auto; }
kbd {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 4px; font-size: 9px; font-family: monospace;
}

/* ── LIST VIEW ─────────────────────────────────────────── */
.list-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 6px; overflow: hidden;
  transition: border-color 0.15s;
}
.list-card:hover { border-color: var(--muted2); }
.list-card.open  { border-color: var(--purple); }

.list-header {
  display: flex; align-items: center; gap: 9px;
  padding: 12px 16px; cursor: pointer; user-select: none;
}
.list-badge {
  padding: 2px 7px; border-radius: 4px;
  font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.05em; flex: 0 0 auto;
}
.list-qid   { font-size: 12px; font-weight: 700; min-width: 46px; flex: 0 0 auto; }
.list-domain { font-size: 11px; color: var(--muted); flex: 0 0 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-q-preview { font-size: 12px; color: #8888b4; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.issue-dot  { width: 5px; height: 5px; background: var(--ts); border-radius: 50%; flex: 0 0 5px; }
.flag-chip  {
  padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 700; flex: 0 0 auto;
}
.flag-chip.ok     { background: rgba(0,230,118,.15);  color: var(--ok);     }
.flag-chip.revise { background: rgba(255,167,38,.15); color: var(--revise); }
.flag-chip.split  { background: rgba(66,165,245,.15); color: var(--split);  }
.flag-chip.drop   { background: rgba(239,83,80,.15);  color: var(--drop);   }
.flag-chip.none   { background: var(--card2); color: var(--muted2); }
.expand-caret { font-size: 9px; color: var(--muted); transition: transform 0.2s; flex: 0 0 auto; }
.list-card.open .expand-caret { transform: rotate(180deg); }

.list-body {
  display: none; padding: 0 16px 16px;
  border-top: 1px solid var(--border);
}
.list-card.open .list-body { display: block; }

/* ── EMPTY / TOAST ─────────────────────────────────────── */
.empty { text-align: center; padding: 60px; color: var(--muted); }

#toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 18px;
  font-size: 12px; color: var(--text);
  opacity: 0; transform: translateY(6px);
  transition: all 0.22s; pointer-events: none; z-index: 9999;
}
#toast.show   { opacity: 1; transform: translateY(0); }
#toast.ok     { border-color: var(--ok);   color: var(--ok);   }
#toast.err    { border-color: var(--drop); color: var(--drop); }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <a href="/" style="color:var(--muted);font-size:12px;text-decoration:none;flex:0 0 auto">🏈 NFL Tools</a>
  <span style="color:var(--muted2);font-size:12px">›</span>
  <div id="header-title">NFL <em>Question Review</em></div>
  <div class="ver-toggle">
    <button class="ver-btn active" id="ver-v0" onclick="setVersion('v0')">V0</button>
    <button class="ver-btn"        id="ver-v1" onclick="setVersion('v1')">V1</button>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('focus')">Focus</button>
    <button class="mode-btn"        onclick="setMode('list')">List</button>
  </div>
  <div id="progress-wrap">
    <span id="progress-text">— / — reviewed</span>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>
</div>

<!-- REVIEWER BAR -->
<div id="reviewer-bar" style="background:rgba(7,7,15,0.96);border-bottom:1px solid var(--border);padding:6px 24px;display:flex;align-items:center;gap:10px;">
  <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted2);flex:0 0 auto;">Reviewer</span>
  <input id="reviewer-input" type="text" placeholder="Your name (appears in Excel export)"
    style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text);font-family:inherit;width:240px;outline:none;"
    onblur="saveReviewer(this.value)" onchange="saveReviewer(this.value)" />
  <span id="reviewer-saved" style="font-size:11px;color:var(--ok);opacity:0;transition:opacity 0.3s;">Saved ✓</span>
</div>

<!-- FILTER BAR -->
<div id="filter-bar">
  <span class="filter-label">Layer</span>
  <button class="filter-pill active" data-layer="all" onclick="setFilter('layer','all',this)">All</button>
  <button class="filter-pill ai"     data-layer="ai"  onclick="setFilter('layer','ai',this)">AI</button>
  <button class="filter-pill di"     data-layer="di"  onclick="setFilter('layer','di',this)">DI</button>
  <button class="filter-pill ti"     data-layer="ti"  onclick="setFilter('layer','ti',this)">TI</button>
  <button class="filter-pill ts"     data-layer="ts"  onclick="setFilter('layer','ts',this)">TS</button>
  <div class="filter-sep"></div>
  <span class="filter-label">Status</span>
  <button class="filter-pill active" data-status="all"        onclick="setFilter('status','all',this)">All</button>
  <button class="filter-pill"        data-status="unreviewed" onclick="setFilter('status','unreviewed',this)">Unreviewed</button>
  <button class="filter-pill"        data-status="reviewed"   onclick="setFilter('status','reviewed',this)">Reviewed</button>
  <button class="filter-pill"        data-status="ok"         onclick="setFilter('status','ok',this)">OK</button>
  <button class="filter-pill"        data-status="flagged"    onclick="setFilter('status','flagged',this)">Flagged</button>
  <div class="fbar-spacer"></div>
  <button class="export-btn" onclick="exportToExcel()">💾 Save to Excel</button>
</div>

<!-- CONTENT -->
<div id="content">
  <!-- FOCUS -->
  <div id="focus-view">
    <div id="focus-card" class="focus-card">
      <div class="empty">Loading questions…</div>
    </div>
    <div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-top:16px">
      <button class="btn-nav" id="btn-prev" onclick="saveAndGo(-1)">← Prev</button>
      <span class="nav-counter" id="nav-counter">— / —</span>
      <button class="btn-nav" id="btn-next" onclick="saveAndGo(1)">Next →</button>
    </div>
  </div>

  <!-- LIST -->
  <div id="list-view">
    <div id="list-container"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';

// ── STATE ─────────────────────────────────────────────────────────────────────
let questions      = [];
let comments       = {};     // { qid: { flag, comment, timestamp } }
let filtered       = [];
let idx            = 0;      // current index in filtered[] (focus mode)
let mode           = 'focus';
let fLayer         = 'all';
let fStatus        = 'all';
let activeVersion  = 'v0';

// ── BOOT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const qUrl = activeVersion === 'v1' ? `${API}/api/questions?v=1` : `${API}/api/questions`;
    const [qr, cr] = await Promise.all([
      fetch(qUrl),
      fetch(`${API}/api/comments`),
    ]);
    questions = await qr.json();
    const cdata = await cr.json();
    comments  = cdata.comments || {};
    const savedName = cdata.meta?.reviewer || '';
    if (savedName) document.getElementById('reviewer-input').value = savedName;
    idx = 0;
    applyFilter();
    updateProgress();
  } catch (e) {
    document.getElementById('focus-card').innerHTML =
      `<div class="empty">Error: ${e.message}<br><small>Make sure the server is running on port 9876.</small></div>`;
  }
}

// ── VERSION TOGGLE ────────────────────────────────────────────────────────────
function setVersion(v) {
  activeVersion = v;
  document.getElementById('ver-v0').classList.toggle('active', v === 'v0');
  document.getElementById('ver-v1').classList.toggle('active', v === 'v1');
  // Reset filters when switching versions
  fLayer = 'all'; fStatus = 'all';
  document.querySelectorAll('[data-layer]').forEach(b  => b.classList.toggle('active', b.dataset.layer  === 'all'));
  document.querySelectorAll('[data-status]').forEach(b => b.classList.toggle('active', b.dataset.status === 'all'));
  init();
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function setFilter(type, val, btn) {
  if (type === 'layer')  { fLayer  = val; document.querySelectorAll('[data-layer]').forEach(b  => b.classList.toggle('active', b.dataset.layer  === val)); }
  if (type === 'status') { fStatus = val; document.querySelectorAll('[data-status]').forEach(b => b.classList.toggle('active', b.dataset.status === val)); }
  idx = 0;
  applyFilter();
}

function applyFilter() {
  filtered = questions.filter(q => {
    const layer = q.id.split('_')[0].toLowerCase();
    if (fLayer !== 'all' && layer !== fLayer) return false;
    const c = comments[vk(q.id)];
    const hasReview = !!(c && (c.flag || c.comment));
    const flag = c?.flag || '';
    if (fStatus === 'unreviewed' && hasReview) return false;
    if (fStatus === 'reviewed'   && !hasReview) return false;
    if (fStatus === 'ok'         && flag !== 'ok') return false;
    if (fStatus === 'flagged'    && !['revise','split','drop'].includes(flag)) return false;
    return true;
  });
  if (idx >= filtered.length) idx = Math.max(0, filtered.length - 1);
  if (mode === 'focus') renderFocus();
  else renderList();
}

// ── MODE ──────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => b.classList.toggle('active', (i===0) === (m==='focus')));
  document.getElementById('focus-view').style.display = m === 'focus' ? 'block' : 'none';
  document.getElementById('list-view').style.display  = m === 'list'  ? 'block' : 'none';
  if (m === 'focus') renderFocus();
  else renderList();
}

// ── FOCUS MODE ────────────────────────────────────────────────────────────────
function renderFocus() {
  const card = document.getElementById('focus-card');
  if (!filtered.length) { card.innerHTML = '<div class="empty">No questions match this filter.</div>'; updateNavBtns(); return; }
  const q = filtered[idx];
  const c = comments[vk(q.id)] || {};
  card.innerHTML = buildCardHTML(q, c, true);
  updateNavBtns();
  // Scroll to top of card on navigation
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function buildCardHTML(q, c, isFocus) {
  const layer    = q.id.split('_')[0];
  const flag     = c.flag || '';
  const comment  = c.comment || '';
  const options  = (q.options || []).filter(Boolean);

  const badge    = `<span class="layer-badge badge-${layer}">${layer}</span>`;
  const ct       = (q.change_type || '').toLowerCase();
  const changeBadge = ct && ct !== 'keep'
    ? `<span class="change-badge change-${ct}">${esc(q.change_type)}</span>`
    : (ct === 'keep' ? `<span class="change-badge change-keep">KEEP</span>` : '');
  const v0ref    = q.v0_ref && q.v0_ref !== q.id
    ? `<div class="v0ref-tag">V0: <span>${esc(q.v0_ref)}</span></div>`
    : '';
  const vcases   = q.value_cases
    ? `<div class="guide-block"><div class="section-lbl">Value Cases</div><div class="guide-text" style="color:#7ecfff">${esc(q.value_cases)}</div></div>`
    : '';
  const cnotes   = q.change_notes
    ? `<div class="guide-block"><div class="section-lbl">Change Notes (V0 → V1)</div><div class="answerguide-text">${esc(q.change_notes)}</div></div>`
    : '';
  const issue    = q.known_issue
    ? `<div class="issue-banner">⚠️ <strong>Known issue:</strong> ${esc(q.known_issue)}</div>`
    : '';
  const opts     = options.length
    ? `<ul class="options-list">${options.map(o=>`<li>${esc(o)}</li>`).join('')}</ul>`
    : '';
  const flags    = [
    { k:'ok',     icon:'✅', lbl:'OK'     },
    { k:'revise', icon:'✏️', lbl:'Revise' },
    { k:'split',  icon:'✂️', lbl:'Split'  },
    { k:'drop',   icon:'🗑️', lbl:'Drop'   },
  ].map(f =>
    `<button class="flag-btn ${f.k}${flag===f.k?' active':''}" onclick="clickFlag('${q.id}','${f.k}',this)">${f.icon} ${f.lbl}</button>`
  ).join('');

  const inlineNav = isFocus ? `
    <button class="btn-nav" onclick="saveAndGo(-1)" ${idx===0?'disabled':''}>← Prev</button>
    <span class="nav-counter">${idx+1} / ${filtered.length}</span>
    <button class="btn-nav" onclick="saveAndGo(1)"  ${idx===filtered.length-1?'disabled':''}>Next →</button>
    <span class="kbd-hint"><kbd>←</kbd><kbd>→</kbd> navigate &nbsp; <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> flag &nbsp; <kbd>Ctrl+↵</kbd> save</span>
  ` : '';

  return `
    <div class="card-meta">
      ${badge}
      <span class="card-qid">${esc(q.id)}</span>
      ${changeBadge}
      <span class="card-domain">${esc(q.domain)}</span>
    </div>
    ${v0ref}
    ${issue}
    <div class="section-lbl">Question</div>
    <div class="question-text">${esc(q.question)}</div>
    <div class="answer-block">
      <span class="format-tag">${esc(q.format)} · ${esc(q.style)}</span>
      ${opts}
    </div>
    ${q.guide ? `
    <div class="guide-block">
      <div class="section-lbl">Guide Explanation</div>
      <div class="guide-text">${esc(q.guide)}</div>
    </div>` : ''}
    ${q.answer_guide ? `
    <div class="guide-block">
      <div class="section-lbl">Answer Guide</div>
      <div class="answerguide-text">${esc(q.answer_guide)}</div>
    </div>` : ''}
    ${vcases}
    ${cnotes}
    <hr class="divider">
    <div class="review-lbl">Flag</div>
    <div class="flag-row">${flags}</div>
    <div class="review-lbl">Comment</div>
    <textarea class="comment-box" id="cmt-${q.id}" placeholder="Notes, concerns, rewrites, questions…">${esc(comment)}</textarea>
    <div class="action-row">
      <button class="btn-save" onclick="saveComment('${q.id}')">Save</button>
      <button class="btn-delete" onclick="deleteComment('${q.id}')" title="Clear this comment and flag">Delete</button>
      ${inlineNav}
    </div>
  `;
}

function updateNavBtns() {
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  const ctr  = document.getElementById('nav-counter');
  if (prev) prev.disabled = idx === 0;
  if (next) next.disabled = idx >= filtered.length - 1 || !filtered.length;
  if (ctr)  ctr.textContent = filtered.length ? `${idx+1} / ${filtered.length}` : '0 / 0';
}

// ── LIST MODE ─────────────────────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById('list-container');
  if (!filtered.length) { container.innerHTML = '<div class="empty">No questions match this filter.</div>'; return; }
  container.innerHTML = filtered.map(q => {
    const c     = comments[vk(q.id)] || {};
    const layer = q.id.split('_')[0];
    const flag  = c.flag || 'none';
    const preview = q.question.length > 90 ? q.question.slice(0, 90) + '…' : q.question;
    const issueDot = q.known_issue ? '<span class="issue-dot" title="Known issue"></span>' : '';
    const flagLabel = c.flag ? c.flag.toUpperCase() : '—';
    return `
      <div class="list-card" id="lc-${q.id}">
        <div class="list-header" onclick="toggleCard('${q.id}')">
          <span class="list-badge badge-${layer}">${layer}</span>
          <span class="list-qid">${esc(q.id)}</span>
          ${issueDot}
          <span class="list-domain">${esc(q.domain)}</span>
          <span class="list-q-preview">${esc(preview)}</span>
          <span class="flag-chip ${flag}">${flagLabel}</span>
          <span class="expand-caret">▾</span>
        </div>
        <div class="list-body">
          <div style="padding-top:16px">${buildCardHTML(q, c, false)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleCard(qid) {
  document.getElementById(`lc-${qid}`).classList.toggle('open');
}

// ── FLAG ──────────────────────────────────────────────────────────────────────
function clickFlag(qid, flag, btn) {
  const row  = btn.closest('.flag-row');
  const vkey = vk(qid);
  row.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('active'));
  const wasActive = (comments[vkey]?.flag === flag);
  if (!comments[vkey]) comments[vkey] = {};
  if (wasActive) {
    comments[vkey].flag = '';
  } else {
    btn.classList.add('active');
    comments[vkey].flag = flag;
  }
  saveComment(qid, true);
}

// ── SAVE ──────────────────────────────────────────────────────────────────────
async function saveComment(qid, silent = false) {
  const vkey    = vk(qid);
  const ta      = document.getElementById(`cmt-${qid}`);
  const comment = ta ? ta.value.trim() : (comments[vkey]?.comment || '');
  const flag    = comments[vkey]?.flag || '';

  if (!comments[vkey]) comments[vkey] = {};
  comments[vkey].comment = comment;

  try {
    const r = await fetch(`${API}/api/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: vkey, flag, comment }),
    });
    if (!r.ok) throw new Error(await r.text());
    if (!silent) toast('Saved ✓', 'ok');
    updateProgress();
    // Update flag chip in list mode
    const chip = document.querySelector(`#lc-${qid} .flag-chip`);
    if (chip) { chip.className = `flag-chip ${flag||'none'}`; chip.textContent = flag ? flag.toUpperCase() : '—'; }
  } catch (e) {
    if (!silent) toast('Save failed: ' + e.message, 'err');
  }
}

// Auto-save on textarea blur
document.addEventListener('focusout', e => {
  const m = e.target?.id?.match(/^cmt-(.+)$/);
  if (m) saveComment(m[1], true);
});

async function saveAndGo(delta) {
  if (filtered.length && filtered[idx]) await saveComment(filtered[idx].id, true);
  const next = idx + delta;
  if (next < 0 || next >= filtered.length) return;
  idx = next;
  renderFocus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── DELETE ────────────────────────────────────────────────────────────────────
async function deleteComment(qid) {
  const vkey = vk(qid);
  try {
    await fetch(`${API}/api/comments/${encodeURIComponent(vkey)}`, { method: 'DELETE' });
    comments[vkey] = { flag: '', comment: '' };
    toast('Deleted', 'ok');
    updateProgress();
    if (mode === 'focus') renderFocus();
    else renderList();
    delete comments[vkey];
  } catch (e) {
    toast('Delete failed: ' + e.message, 'err');
  }
}

// ── REVIEWER ──────────────────────────────────────────────────────────────────
async function saveReviewer(name) {
  try {
    await fetch(`${API}/api/reviewer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const el = document.getElementById('reviewer-saved');
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 1800);
  } catch (_) {}
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
async function exportToExcel() {
  toast('Exporting…');
  try {
    const url  = activeVersion === 'v1' ? `${API}/api/export?v=1` : `${API}/api/export`;
    const r    = await fetch(url, { method: 'POST' });
    const data = await r.json();
    if (data.ok) toast(`Saved → ${data.file.split('/').slice(-1)[0]} (col ${data.col})`, 'ok');
    else toast('Export failed: ' + data.msg, 'err');
  } catch (e) {
    toast('Export failed: ' + e.message, 'err');
  }
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function updateProgress() {
  const reviewed = questions.filter(q => { const c = comments[vk(q.id)]; return c && (c.flag || c.comment); }).length;
  const total    = questions.length;
  document.getElementById('progress-text').textContent = `${reviewed} / ${total} reviewed`;
  document.getElementById('progress-fill').style.width = total ? `${(reviewed/total)*100}%` : '0%';
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (mode !== 'focus') return;
  const tag = document.activeElement?.tagName;
  if (tag === 'TEXTAREA') {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); saveComment(filtered[idx]?.id); }
    return;
  }
  if (e.key === 'ArrowRight') { e.preventDefault(); saveAndGo(1);  }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); saveAndGo(-1); }
  const flagMap = { '1':'ok', '2':'revise', '3':'split', '4':'drop' };
  if (flagMap[e.key]) {
    const q = filtered[idx]; if (!q) return;
    const btn = document.querySelector(`#focus-card .flag-btn.${flagMap[e.key]}`);
    if (btn) clickFlag(q.id, flagMap[e.key], btn);
  }
});

// ── UTILS ─────────────────────────────────────────────────────────────────────
// Returns the storage key for a question, namespaced by active version.
// V0 keys are bare (e.g. "TI_1"); V1 keys are prefixed (e.g. "v1:TI_1").
// This prevents collisions when V0 and V1 share the same question IDs.
function vk(qid) { return activeVersion === 'v1' ? 'v1:' + qid : qid; }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 2600);
}

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
